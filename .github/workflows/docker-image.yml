name: Docker Image CI

on:
  push:
    branches:
      - fnal  
      - fnal-dev
  pull_request:
    branches: [ fnal ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
   
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: adregistry.fnal.gov/epics/pvws
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=v${{ github.run_number }},enable={{is_default_branch}}
            type=raw,value=dev${{ github.run_number }},enable=${{ github.ref_name == 'fnal-dev'}}
  
      - name: Log in to Docker Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: adregistry.fnal.gov
          username: ${{ secrets.ADREGISTRY_EPICS_USERNAME }}
          password: ${{ secrets.ADREGISTRY_EPICS_SECRET }}


      - name: Building Docker image and pushing to adregistry
        uses: docker/build-push-action@v4
        with:
          context: docker
          build-args: |
            GITHUB_USERNAME=${{ github.actor }}
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}